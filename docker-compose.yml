services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - JURY_BASE_URL=${JURY_BASE_URL}
      - SUPERADMIN_EMAIL=${SUPERADMIN_EMAIL}
      - SUPERADMIN_PASSWORD=${SUPERADMIN_PASSWORD}
    restart: unless-stopped

  client-web:
    build:
      context: .
      dockerfile: apps/client-web/Dockerfile
    ports:
      - "${CLIENT_PORT:-8081}:80"
    environment:
      - VITE_API_URL=${VITE_CLIENT_API_URL}
      - VITE_SOCKET_URL=${VITE_CLIENT_SOCKET_URL}
      - VITE_JURY_URL=${VITE_CLIENT_JURY_URL}
    restart: unless-stopped

  jury-web:
    build:
      context: .
      dockerfile: apps/jury-web/Dockerfile
    ports:
      - "${JURY_PORT:-8082}:80"
    environment:
      - VITE_API_URL=${VITE_JURY_API_URL}
      - VITE_SOCKET_URL=${VITE_JURY_SOCKET_URL}
    restart: unless-stopped

  superadmin-web:
    build:
      context: .
      dockerfile: apps/superadmin-web/Dockerfile
    ports:
      - "${SUPERADMIN_PORT:-8083}:80"
    environment:
      - VITE_API_URL=${VITE_SUPERADMIN_API_URL}
    restart: unless-stopped
