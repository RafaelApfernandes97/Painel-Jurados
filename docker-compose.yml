services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - mongo

  client-web:
    build:
      context: .
      dockerfile: apps/client-web/Dockerfile
      args:
        VITE_API_URL: ${VITE_CLIENT_API_URL}
        VITE_SOCKET_URL: ${VITE_CLIENT_SOCKET_URL}
        VITE_JURY_URL: ${VITE_CLIENT_JURY_URL}
    ports:
      - "8081:80"
    restart: unless-stopped

  jury-web:
    build:
      context: .
      dockerfile: apps/jury-web/Dockerfile
      args:
        VITE_API_URL: ${VITE_JURY_API_URL}
        VITE_SOCKET_URL: ${VITE_JURY_SOCKET_URL}
    ports:
      - "8082:80"
    restart: unless-stopped

  superadmin-web:
    build:
      context: .
      dockerfile: apps/superadmin-web/Dockerfile
      args:
        VITE_API_URL: ${VITE_SUPERADMIN_API_URL}
    ports:
      - "8083:80"
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
