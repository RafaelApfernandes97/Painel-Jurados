services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-3000}:3000"
    env_file:
      - apps/api/.env
    restart: unless-stopped

  client-web:
    build:
      context: .
      dockerfile: apps/client-web/Dockerfile
    ports:
      - "${CLIENT_PORT:-8081}:80"
    env_file:
      - apps/client-web/.env
    restart: unless-stopped

  jury-web:
    build:
      context: .
      dockerfile: apps/jury-web/Dockerfile
    ports:
      - "${JURY_PORT:-8082}:80"
    env_file:
      - apps/jury-web/.env
    restart: unless-stopped

  superadmin-web:
    build:
      context: .
      dockerfile: apps/superadmin-web/Dockerfile
    ports:
      - "${SUPERADMIN_PORT:-8083}:80"
    env_file:
      - apps/superadmin-web/.env
    restart: unless-stopped
